name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-14 # macOS 14 includes Xcode 15+ which is required for iOS 16 builds

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.19.0' # Optional: Specify your version if needed

      - name: Clean project
        run: flutter clean

      - name: Get packages
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          # Ensure Cocoapods is updated to handle new dependency resolution
          gem install cocoapods
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod repo update
          pod install --repo-update

      - name: Build IPA
        run: flutter build ipa --no-codesign --release

      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/ipa/*.ipa
          tag: ${{ github.ref_name }}
          overwrite: true
          body: "iOS IPA build (no signing)"
