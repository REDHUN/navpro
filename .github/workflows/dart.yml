name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.19.0'

      - name: Clean project
        run: flutter clean

      - name: Get packages
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          gem install cocoapods
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod repo update
          pod install --repo-update

      - name: Build iOS App
        # We pass PROVISIONING_PROFILE_SPECIFIER and DEVELOPMENT_TEAM as empty 
        # to bypass the Xcode requirement for a team during the build phase.
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=1 \
            --extra-gen-snapshot-options="--no-incremental-cc" \
            --debug-dart-performance

      - name: Create IPA (Manual)
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r navprov2.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/navprov2.ipa
          
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/navprov2.ipa
          tag: ${{ github.ref_name }}
          overwrite: true
          body: "iOS IPA build (no signing)"
